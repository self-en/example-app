name: example-app

on:
  push:
    branches: ["**"]
    paths:
      - "example-app/**"
      - ".github/workflows/example-app.yml"
  pull_request:
    paths:
      - "example-app/**"

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The branch-slug tag must match ArgoCD's `{{ .branch | slugify }}` (used
      # both for the preview hostname and, via the ApplicationSet's `image.tag`
      # helm parameter, for the image each branch's preview pulls) - otherwise
      # the two would drift apart.
      - name: Compute image tags
        id: tags
        run: |
          image="ghcr.io/${{ github.repository }}/example-app"
          sha_tag="${image}:sha-$(git rev-parse --short HEAD)"
          tags="${sha_tag}"
          if [ "${{ github.event_name }}" = "push" ]; then
            slug=$(printf '%s' "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//')
            tags=$(printf '%s\n%s:%s' "$tags" "$image" "$slug")
          fi
          {
            echo "tags<<EOF"
            echo "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: example-app
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
