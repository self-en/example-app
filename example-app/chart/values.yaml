image:
  # Built and pushed by .github/workflows/example-app.yml
  repository: ghcr.io/self-en/example-app/example-app
  tag: main
  pullPolicy: IfNotPresent

replicaCount: 1
containerPort: 3000

service:
  port: 80

# Overridden per-branch by the ApplicationSet via `helm parameters` - the app repo
# never needs to set this manually.
hostname: changeme.self-en.local

# Shared Gateway created once by the platform automation. Only override if you
# renamed it during install.
gateway:
  name: eg
  namespace: envoy-gateway-system

# Secret with keys username/password/uri, created by CloudNativePG in the
# "postgres" namespace. It is NOT automatically copied into preview-<slug>
# namespaces (see README "Note" / CLAUDE.md known limitations) - copy it in
# manually, or the pod will fail to start until you do:
#   kubectl -n postgres get secret postgres-app -o yaml \
#     | sed 's/namespace: postgres/namespace: preview-<slug>/' \
#     | kubectl apply -f -
postgres:
  secretName: postgres-app

# dockerconfigjson secret for pulling the (private) GHCR image. Same caveat as
# postgres.secretName above: not automatically created in preview-<slug>
# namespaces - see README. Set to "" if the GHCR package is public.
imagePullSecret:
  name: ghcr-pull-secret
