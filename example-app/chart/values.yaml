image:
  # Built and pushed by .github/workflows/example-app.yml
  repository: ghcr.io/self-en/example-app/example-app
  tag: main
  pullPolicy: IfNotPresent

replicaCount: 1
containerPort: 3000

service:
  port: 80

# Overridden per-branch by the ApplicationSet via `helm parameters` - the app repo
# never needs to set this manually.
hostname: changeme.self-en.local

# Shared Gateway created once by the platform automation. Only override if you
# renamed it during install.
gateway:
  name: eg
  namespace: envoy-gateway-system

# Connection info for the *shared* Postgres cluster - overridden per-branch by
# the ApplicationSet (see setup-k3s/scripts/remote/04-appset.sh), which reads
# these once from the real postgres-app/postgres-superuser secrets and passes
# them straight through as plain helm parameters (no Kubernetes Secret, no
# per-namespace copying - deliberately simple, not meant to be secure).
#
# The chart itself owns per-branch data isolation: a PreSync hook Job
# (templates/db-create-job.yaml) creates a database named after the release
# (see _helpers.tpl's example-app.dbName, e.g. preview-main -> preview_main)
# on first sync, and DATABASE_URL points at that database rather than a
# shared one. A PreDelete hook Job (templates/db-drop-job.yaml) drops it when
# the branch (and so this Application) is deleted - both need adminPassword
# since creating/dropping a database isn't something the app's own user can do.
postgres:
  host: postgres-rw.postgres.svc.cluster.local
  port: 5432
  appUser: app
  appPassword: ""
  adminUser: postgres
  adminPassword: ""

# dockerconfigjson secret for pulling the GHCR image, only needed while the
# package is private. Not automatically created in preview-<slug> namespaces -
# see README. Set to "" once the package is public (kubelet just warns and
# proceeds if the referenced secret is missing, so leaving this set even after
# going public is harmless).
imagePullSecret:
  name: ghcr-pull-secret
