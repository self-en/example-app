apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: ${POSTGRES_CLUSTER_NAME}
  namespace: ${POSTGRES_NAMESPACE}
spec:
  instances: 1
  # Needed so 04-appset.sh can create/drop a per-branch database as postgres
  # superuser (see example-app/chart's db-create-job/db-drop-job hooks).
  enableSuperuserAccess: true
  storage:
    size: 2Gi
