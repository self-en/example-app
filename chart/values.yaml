image:
  # Built and pushed by .github/workflows/example-app.yml
  repository: ghcr.io/self-en/example-app/example-app
  tag: main
  # The branch-slug tag is mutable - every push to an existing branch rebuilds
  # the SAME tag with new content. IfNotPresent would leave already-running
  # pods on whatever digest the node happened to cache first (confirmed: a
  # push that only changed the frontend didn't show up on the running preview
  # until pods were force-recreated). Always makes kubelet check the registry
  # digest on every pod (re)start instead of trusting the local cache.
  pullPolicy: Always

replicaCount: 1
containerPort: 3000

# Set per-branch by the ApplicationSet to the pushed commit's sha (unlike
# image.tag, this changes on every commit even to an existing branch) and
# stamped as a pod annotation below - forces the Deployment spec to actually
# differ on every commit, so ArgoCD's selfHeal redeploys automatically instead
# of leaving already-running pods on stale content until something else
# triggers a pod recreation.
commitSha: ""

service:
  port: 80

# Overridden per-branch by the ApplicationSet via `helm parameters` - the app repo
# never needs to set this manually.
hostname: changeme.self-en.local

# Shared Gateway created once by the platform automation. Only override if you
# renamed it during install.
gateway:
  name: eg
  namespace: envoy-gateway-system

# Connection info for the *shared* Postgres cluster - overridden per-branch by
# the ApplicationSet (see setup-k3s/scripts/remote/04-appset.sh), which reads
# these once from the real postgres-app/postgres-superuser secrets and passes
# them straight through as plain helm parameters (no Kubernetes Secret, no
# per-namespace copying - deliberately simple, not meant to be secure).
#
# The chart owns per-branch data isolation on the way in: a PreSync hook Job
# (templates/db-create-job.yaml) creates a database named after the release
# (see _helpers.tpl's example-app.dbName, e.g. preview-main -> preview_main)
# on first sync, and DATABASE_URL points at that database rather than a
# shared one - needs adminPassword since creating a database isn't something
# the app's own user can do. Cleanup on the way out is NOT a PreDelete hook
# here: ArgoCD can't render hook manifests once the branch is already gone
# from git, so a cluster-side CronJob (setup-k3s/manifests/db-reconciler.yaml.tpl)
# drops any preview_<slug> database whose Application no longer exists instead.
postgres:
  host: postgres-rw.postgres.svc.cluster.local
  port: 5432
  appUser: app
  appPassword: ""
  adminUser: postgres
  adminPassword: ""

# dockerconfigjson secret for pulling the GHCR image, only needed while the
# package is private. Not automatically created in preview-<slug> namespaces -
# see README. Set to "" once the package is public (kubelet just warns and
# proceeds if the referenced secret is missing, so leaving this set even after
# going public is harmless).
imagePullSecret:
  name: ghcr-pull-secret

# OpenTelemetry (metrics + logs; tracing is intentionally not enabled - see
# backend/src/instrumentation.js). endpoint empty (the default) means the app
# doesn't start the SDK at all - self-en/infra sets this per-branch once a
# collector exists, same "unset by default, wired by the ApplicationSet"
# pattern as postgres.* above.
otel:
  endpoint: ""

# Injected per-branch by the ApplicationSet, same "unset by default, wired
# by helm parameters" pattern as postgres.* and otel.endpoint above. Empty by
# default so the app repo never needs to set this manually.
claudeCodeOAuthToken: ""
