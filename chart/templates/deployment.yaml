apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
      annotations:
        self-en.dev/commit-sha: {{ .Values.commitSha | quote }}
    spec:
      {{- if .Values.imagePullSecret.name }}
      imagePullSecrets:
      - name: {{ .Values.imagePullSecret.name }}
      {{- end }}
      containers:
      - name: app
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.containerPort }}
        env:
        - name: PORT
          value: "{{ .Values.containerPort }}"
        - name: DATABASE_URL
          value: "postgresql://{{ .Values.postgres.appUser }}:{{ .Values.postgres.appPassword }}@{{ .Values.postgres.host }}:{{ .Values.postgres.port }}/{{ include "example-app.dbName" . }}"
        {{- if .Values.otel.endpoint }}
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: {{ .Values.otel.endpoint | quote }}
        - name: OTEL_SERVICE_NAME
          value: {{ .Release.Name | quote }}
        {{- end }}
        {{- if .Values.claudeCodeOAuthToken }}
        - name: CLAUDE_CODE_OAUTH_TOKEN
          value: {{ .Values.claudeCodeOAuthToken | quote }}
        {{- end }}
