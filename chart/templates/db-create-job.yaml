apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-db-create
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-db-create
    spec:
      restartPolicy: Never
      containers:
      - name: create-db
        image: postgres:16-alpine
        env:
        - name: PGHOST
          value: {{ .Values.postgres.host | quote }}
        - name: PGPORT
          value: {{ .Values.postgres.port | quote }}
        - name: PGUSER
          value: {{ .Values.postgres.adminUser | quote }}
        - name: PGPASSWORD
          value: {{ .Values.postgres.adminPassword | quote }}
        - name: DB_NAME
          value: {{ include "example-app.dbName" . | quote }}
        - name: APP_USER
          value: {{ .Values.postgres.appUser | quote }}
        command:
        - sh
        - -c
        - |
          set -e
          psql -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = '$DB_NAME'" | grep -q 1 \
            || psql -d postgres -c "CREATE DATABASE \"$DB_NAME\" OWNER \"$APP_USER\""
